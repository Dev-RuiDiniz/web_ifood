name: .NET Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore backend/src/web_ifood.sln
    - name: Build
      run: dotnet build backend/src/web_ifood.sln --no-restore
    - name: Test
      run: dotnet test backend/src/web_ifood.sln --no-build --verbosity normal
