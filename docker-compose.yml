version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: web_ifood_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: web_ifood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: web_ifood_cache
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: web_ifood_adminer
    ports:
      - "8080:8080"
    depends_on:
      - database

volumes:
  postgres_data:
